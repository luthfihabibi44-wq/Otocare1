<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Data Unit - OtoCare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fafafa; color: #111111; letter-spacing: -0.01em; }
        .navbar-clean { background: #ffffff; border-bottom: 1px solid #eaeaea; }
        .panel-card { background: #ffffff; border: 1px solid #eaeaea; border-radius: 12px; padding: 32px; }
        .form-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: #555555; font-weight: 600; margin-bottom: 8px; }
        .form-control, .form-select { border: 1px solid #eaeaea; border-radius: 8px; padding: 11px 14px; font-size: 0.9rem; background-color: #fff; color: #111; }
        .form-control:focus, .form-select:focus { border-color: #111111; box-shadow: none; }
        .btn-dark-modern { background: #111111; color: #ffffff; border: none; border-radius: 8px; padding: 12px 24px; font-size: 0.9rem; font-weight: 500; }
        .sector-title { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: #888888; }
    </style>
</head>
<body>

    <nav class="navbar navbar-clean py-3 mb-5">
        <div class="container">
            <a href="armada.html" class="text-decoration-none text-dark small fw-medium"><i class="bi bi-arrow-left me-2"></i> Batalkan & Kembali</a>
            <span class="text-muted small fw-semibold text-uppercase tracking-wider">Modul Pembaruan Data</span>
        </div>
    </nav>

    <div class="container" style="max-width: 700px;">
        <div class="panel-card mb-5">
            <div class="d-flex align-items-center gap-2 mb-4"><i class="bi bi-pencil-square fs-4"></i><h4 class="fw-bold m-0">Perbarui Parameter Unit</h4></div>
            
            <form id="formEditMotor">
                <div class="row g-3 mb-3">
                    <div class="col-md-6"><label class="form-label">Nama / Seri Motor</label><input type="text" id="nama" class="form-control" required></div>
                    <div class="col-md-3"><label class="form-label">Nomor Plat</label><input type="text" id="plat" class="form-control" required></div>
                    <div class="col-md-3"><label class="form-label">Transmisi</label><select id="jenis" class="form-select"><option value="Matic">Matic (CVT)</option><option value="Manual">Manual / Rantai</option></select></div>
                </div>
                <div class="mb-4"><label class="form-label">Odometer Saat Ini (KM)</label><input type="number" id="km_sekarang" class="form-control" required></div>
                <hr class="my-4" style="border-color: #eaeaea;">
                
                <div class="mb-4"><div class="sector-title mb-2">Sektor 1: Pelumasan (Oli Mesin)</div><div class="row g-2"><div class="col-6"><input type="date" id="tgl_oli" class="form-control" required></div><div class="col-6"><input type="number" id="km_oli" class="form-control" required></div></div></div>
                <div class="mb-4"><div class="sector-title mb-2">Sektor 2: Mesin & Pengapian (Tune-Up)</div><div class="row g-2"><div class="col-6"><input type="date" id="tgl_mesin" class="form-control" required></div><div class="col-6"><input type="number" id="km_mesin" class="form-control" required></div></div></div>
                <div class="mb-4"><div class="sector-title mb-2">Sektor 3: Komponen Penggerak (CVT / Rantai)</div><div class="row g-2"><div class="col-6"><input type="date" id="tgl_cvt" class="form-control" required></div><div class="col-6"><input type="number" id="km_cvt" class="form-control" required></div></div></div>
                <div class="mb-4"><div class="sector-title mb-2">Sektor 4: Pengendalian & Pengaman (Sistem Rem)</div><div class="row g-2"><div class="col-6"><input type="date" id="tgl_kaki" class="form-control" required></div><div class="col-6"><input type="number" id="km_kaki" class="form-control" required></div></div></div>
                <div class="mb-4"><div class="sector-title mb-2">Sektor 5: Kelistrikan & Pasokan Aki</div><div class="row g-2"><div class="col-6"><input type="date" id="tgl_listrik" class="form-control" required></div><div class="col-6"><input type="number" id="km_listrik" class="form-control" required></div></div></div>

                <div class="d-flex justify-content-end gap-2 mt-5">
                    <a href="armada.html" class="btn btn-light border px-4" style="border-radius: 8px;">Batal</a>
                    <button type="submit" class="btn btn-dark-modern px-4">Simpan Perubahan</button>
                </div>
            </form>
        </div>
    </div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const motorId = parseInt(urlParams.get('id'));
    let kendaraanList = JSON.parse(localStorage.getItem('kendaraan')) || [];
    const idx = kendaraanList.findIndex(m => m.id === motorId);
    const motor = kendaraanList[idx];

    if (motor) {
        document.getElementById('nama').value = motor.nama;
        document.getElementById('plat').value = motor.plat;
        document.getElementById('jenis').value = motor.jenis;
        document.getElementById('km_sekarang').value = motor.km_sekarang;
        document.getElementById('tgl_oli').value = motor.tgl_oli;
        document.getElementById('km_oli').value = motor.km_oli;
        document.getElementById('tgl_mesin').value = motor.tgl_mesin;
        document.getElementById('km_mesin').value = motor.km_mesin;
        document.getElementById('tgl_cvt').value = motor.tgl_cvt;
        document.getElementById('km_cvt').value = motor.km_cvt;
        document.getElementById('tgl_kaki').value = motor.tgl_kaki;
        document.getElementById('km_kaki').value = motor.km_kaki;
        document.getElementById('tgl_listrik').value = motor.tgl_listrik;
        document.getElementById('km_listrik').value = motor.km_listrik;
    }

    document.getElementById('formEditMotor').addEventListener('submit', function(e) {
        e.preventDefault();
        if (idx !== -1) {
            kendaraanList[idx] = {
                id: motorId,
                nama: document.getElementById('nama').value,
                plat: document.getElementById('plat').value,
                jenis: document.getElementById('jenis').value,
                km_sekarang: parseInt(document.getElementById('km_sekarang').value),
                tgl_oli: document.getElementById('tgl_oli').value,
                km_oli: parseInt(document.getElementById('km_oli').value),
                tgl_mesin: document.getElementById('tgl_mesin').value,
                km_mesin: parseInt(document.getElementById('km_mesin').value),
                tgl_cvt: document.getElementById('tgl_cvt').value,
                km_cvt: parseInt(document.getElementById('km_cvt').value),
                tgl_kaki: document.getElementById('tgl_kaki').value,
                km_kaki: parseInt(document.getElementById('km_kaki').value),
                tgl_listrik: document.getElementById('tgl_listrik').value,
                km_listrik: parseInt(document.getElementById('km_listrik').value)
            };
            localStorage.setItem('kendaraan', JSON.stringify(kendaraanList));
            window.location.href = 'armada.html';
        }
    });
</script>
</body>
</html>
